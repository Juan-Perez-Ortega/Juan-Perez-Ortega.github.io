<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio de Ciberseguridad | Juan Pérez Ortega</title>
    <!-- Incluimos la fuente similar a terminal si queremos un estilo 'hacker', o Segoe UI para moderno -->
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --link-color: #58a6ff;
            --code-bg: #161b22;
            --border-color: #30363d;
            --btn-bg: #238636;
            --btn-hover: #2ea043;
            --accent: #58a6ff;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            line-height: 1.6; 
        }

        a { color: var(--link-color); text-decoration: none; }
        a:hover { text-decoration: underline; }
        
        pre, code { 
            background-color: var(--code-bg); 
            padding: 2px 6px; 
            border-radius: 4px; 
            font-family: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, "Liberation Mono", monospace; 
        }
        pre { padding: 16px; overflow: auto; border: 1px solid var(--border-color); }
        
        img { max-width: 100%; border-radius: 6px; }
        
        h1, h2, h3 { 
            border-bottom: 1px solid var(--border-color); 
            padding-bottom: 8px; 
            margin-top: 24px;
        }
        
        table { 
            border-collapse: collapse; 
            width: 100%; 
            margin-bottom: 20px; 
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }
        th, td { 
            border: 1px solid var(--border-color); 
            padding: 10px; 
            text-align: left; 
        }
        th { background-color: var(--code-bg); }
        
        blockquote {
            padding: 0 1em;
            color: #8b949e;
            border-left: .25em solid #30363d;
            margin: 0;
        }

        .footer { 
            margin-top: 60px; 
            text-align: center; 
            border-top: 1px solid var(--border-color); 
            padding-top: 30px; 
            color: #8b949e; 
        }
        
        .btn { 
            display: inline-block; 
            padding: 10px 20px; 
            background-color: var(--code-bg); 
            color: var(--text-color) !important; 
            border: 1px solid var(--border-color);
            border-radius: 6px; 
            font-weight: bold; 
            margin-top: 15px;
            transition: all 0.2s;
        }
        .btn:hover { 
            background-color: #30363d; 
            text-decoration: none; 
        }
    </style>
</head>
<body>

    <!-- Contenido inyectado por Markdown -->
    {{ content }}

    <!-- Footer personalizado -->
    <div class="footer">
        <h3>🛡️ Portfolio de Ciberseguridad | Juan Pérez Ortega</h3>
        <p>Documentación técnica de ejercicios y prácticas en entornos controlados.</p>
        <a href="https://github.com/Juan-Perez-Ortega/Juan-Perez-Ortega.github.io" class="btn">View Repo on GitHub</a>
    </div>

</body>
</html>
